name: CI / CD - Build, Push, Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: <TODO_DOCKERHUB_USER>/springuma

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven (tests)
        run: ./mvnw -B -U verify

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # TODO provide in repo secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Set image output
        id: set-image
        run: echo "::set-output name=image::${{ env.IMAGE_NAME }}:${{ github.sha }}"

  deploy:
    needs: build-and-push
    # This job uses a self-hosted runner that has access to your local k8s cluster
    runs-on: [self-hosted, linux, k8s-deployer] # TODO: ensure you have a self-hosted runner with label 'k8s-deployer'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure kubectl present
        run: |
          if ! command -v kubectl; then
            echo "kubectl not found on runner"; exit 1
          fi

      - name: (Optional) Login to Docker Hub on runner
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy to Kubernetes
        run: |
          IMAGE=${{ needs.build-and-push.outputs.image }}
          # Replace placeholder in k8s/deployment.yaml
          sed -i "s|<DOCKER_IMAGE_PLACEHOLDER>|${IMAGE}|g" k8s/deployment.yaml || true
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl -n default rollout status deployment/springuma --timeout=120s
